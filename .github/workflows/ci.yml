name: CI

# Run the full bootstrap + converge on every change to main, plus on demand.
# A single Debian target is sufficient (no OS matrix needed).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  converge:
    name: bootstrap + converge (debian)
    runs-on: ubuntu-latest
    # A full converge installs Homebrew, Go, Rust, and ~25 language tools
    # (some built from source), so give it plenty of headroom.
    timeout-minutes: 90
    container:
      # Debian trixie (glibc 2.41) rather than bookworm (glibc 2.36): current
      # Homebrew bottles require glibc >= 2.39, and on an older host Homebrew
      # drags in its own brewed glibc/gcc toolchain (heavy and failure-prone in
      # CI). Trixie also ships a modern ansible-core/community.general, so the
      # homebrew module is compatible with current Homebrew output.
      image: debian:trixie
    env:
      # Homebrew and several tools expect a UTF-8 locale.
      LANG: C.UTF-8
      LC_ALL: C.UTF-8

    steps:
      # actions/checkout prefers git; install base deps (and sudo) first so the
      # rest of the job can run as a non-root user.
      - name: Install base dependencies
        run: |
          set -eux
          apt-get update -y
          apt-get install -y --no-install-recommends \
            sudo curl git ca-certificates file procps build-essential \
            python3 python3-pip locales

      - name: Checkout
        uses: actions/checkout@v4

      # Homebrew refuses to run as root, so create an unprivileged user with
      # passwordless sudo (the playbook's apt tasks need become) and hand the
      # checkout over to it.
      - name: Create non-root build user
        run: |
          set -eux
          useradd -m -s /bin/bash dev
          echo 'dev ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/dev
          chmod 0440 /etc/sudoers.d/dev
          chown -R dev:dev "$GITHUB_WORKSPACE"

      # Run 1 - setup: a default (fast) converge installs Ansible + the
      # community.general collection, then installs everything that is missing.
      # This is the heavy first run (compiles the go/cargo tools from source).
      - name: Setup environment (update-env.sh)
        run: |
          set -eux
          sudo -u dev env \
            HOME=/home/dev \
            LANG=C.UTF-8 LC_ALL=C.UTF-8 \
            DOTFILES_USER_NAME="CI Tester" \
            DOTFILES_USER_EMAIL="ci@example.com" \
            bash "$GITHUB_WORKSPACE/update-env.sh"

      # Run 2 - upgrade: exercises the --upgrade path (brew update + state:latest,
      # go/cargo re-fetch @latest, rustup update). Several tasks are intentionally
      # always-changed here, so this is not an idempotency assertion -- it just
      # proves the upgrade path completes without error.
      - name: Upgrade pass (update-env.sh --upgrade)
        run: |
          set -eux
          sudo -u dev env \
            HOME=/home/dev \
            LANG=C.UTF-8 LC_ALL=C.UTF-8 \
            DOTFILES_USER_NAME="CI Tester" \
            DOTFILES_USER_EMAIL="ci@example.com" \
            bash "$GITHUB_WORKSPACE/update-env.sh" --upgrade

      # Run 3 - idempotency: a default converge after everything is present must
      # report changed=0 for the install tasks (the `creates`/state:present guards
      # skip already-installed tools). We assert the recap shows no changes.
      - name: Idempotency check (update-env.sh, expect changed=0)
        run: |
          set -euxo pipefail
          sudo -u dev env \
            HOME=/home/dev \
            LANG=C.UTF-8 LC_ALL=C.UTF-8 \
            DOTFILES_USER_NAME="CI Tester" \
            DOTFILES_USER_EMAIL="ci@example.com" \
            bash "$GITHUB_WORKSPACE/update-env.sh" 2>&1 | tee /tmp/converge3.log
          # Fail if any host reports a non-zero changed count in the PLAY RECAP.
          # Isolate the recap lines first (they contain 'unreachable=') so a
          # --diff content line can't false-match 'changed=N'.
          if grep 'unreachable=' /tmp/converge3.log | grep -E 'changed=[1-9]'; then
            echo "::error::Third converge was not idempotent (changed > 0 above)."
            exit 1
          fi
          echo "Idempotent: no changes on the steady-state converge."
