---
# homebrew role - install Homebrew if absent (Linux + macOS), then install /
# upgrade a list of formulae. All brew operations run as the invoking user,
# never root.

- name: Determine Homebrew prefix
  ansible.builtin.set_fact:
    brew_prefix: >-
      {{ '/opt/homebrew' if (ansible_system == 'Darwin' and ansible_architecture == 'arm64')
         else '/usr/local' if ansible_system == 'Darwin'
         else '/home/linuxbrew/.linuxbrew' }}

- name: Check whether brew is already on PATH
  ansible.builtin.command: brew --version
  register: brew_check
  changed_when: false
  failed_when: false

- name: Check for brew binary at expected prefix
  ansible.builtin.stat:
    path: "{{ brew_prefix }}/bin/brew"
  register: brew_bin

# On Linux the install prefix is /home/linuxbrew/.linuxbrew, but /home is
# root-owned, so the installer needs root to create it. It tries to do that with
# its own `sudo`, which fails here: Ansible runs the install shell without a TTY
# and does not feed it the become password, so the installer's sudo cannot
# authenticate ("Insufficient permissions to install Homebrew..."). We instead
# create the prefix as root ourselves and hand it to the invoking user. The
# installer then sees a writable prefix and never needs sudo. (macOS is left to
# the installer: its prefixes -- /opt/homebrew, /usr/local -- have their own
# ownership conventions we should not blanket-chown.)
- name: Pre-create Homebrew prefix owned by the invoking user (Linux)
  become: true
  ansible.builtin.file:
    path: "{{ brew_prefix }}"
    state: directory
    owner: "{{ ansible_user_id }}"
    mode: "0755"
    recurse: true
  when:
    - ansible_system == 'Linux'
    - brew_check.rc != 0
    - not brew_bin.stat.exists

- name: Install Homebrew (non-interactive)
  ansible.builtin.shell: >-
    /bin/bash -c "$(curl -fsSL
    https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  environment:
    NONINTERACTIVE: "1"
  when:
    - brew_check.rc != 0
    - not brew_bin.stat.exists
  changed_when: true

# Tell the homebrew modules exactly where brew lives, since a freshly installed
# brew is not yet on this Ansible session's PATH. brew always lives at
# <prefix>/bin regardless of how it was installed.
- name: Resolve brew bin directory
  ansible.builtin.set_fact:
    brew_bin_dir: "{{ brew_prefix }}/bin"

# Default (upgrade=false): state=present + update_homebrew=false. This is the
# key speedup -- it skips `brew update` (a full git-fetch of homebrew-core on
# every run) and only installs formulae that are missing. Upgrade mode runs
# `brew update` and state=latest to bump everything.
#
# On macOS we also pull in the low-level utils that Linux gets from its native
# package manager. Everything here lives in homebrew-core (trusted by default);
# no third-party taps are used, so there is no tap-trust gate to work around.
- name: Install Homebrew formulae (upgrade bumps to latest)
  community.general.homebrew:
    name: >-
      {{ homebrew_formulae
         + (homebrew_formulae_darwin if ansible_system == 'Darwin' else []) }}
    state: "{{ 'latest' if (upgrade | bool) else 'present' }}"
    update_homebrew: "{{ upgrade | bool }}"
    path: "{{ brew_bin_dir }}"

- name: Reminder to add brew to shell init (Linux)
  ansible.builtin.debug:
    msg: >-
      Ensure your dotfiles eval the brew shellenv on Linux:
      eval "$({{ brew_prefix }}/bin/brew shellenv)"
  when: ansible_system == 'Linux'
